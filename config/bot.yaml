app:
  mode: live
  poll_interval_sec: 120
  symbol: BTCUSDT
  interval: 5m

strategy:
  ema_fast: 50
  ema_slow: 200
  rsi_period: 14
  rsi_entry_min: 35
  rsi_entry_max: 65
  rsi_exit: 70
  volume_sma_period: 20
  volume_multiplier: 0.5
  volume_filter_enabled: false

risk:
  starting_capital: 70
  position_pct_min: 0.25
  position_pct_max: 0.30
  stop_loss_pct: 0.015
  take_profit_rr: 1.5
  daily_loss_cap_pct: 0.03
  max_open_positions: 2

logging:
  trade_log: data/paper_trades.csv
  blotter_log: data/paper_blotter.csv
  state_file: data/state/paper_state.json
  signal_log: data/logs/signal_evals.csv
  live_trade_log: logs/live/trades.csv
  live_execution_log: logs/live/orders.jsonl
  live_signal_log: logs/live/signals.csv
  live_state_file: data/state/live_state.json

live:
  min_balance: 50
  min_notional: 12
  fee_bps: 10
